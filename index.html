<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sniper Capital Board</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero reveal">
        <div class="hero-copy">
          <p class="eyebrow">Personal Portfolio Board</p>
          <h1 id="page-title" class="hero-title">Sniper Capital Board</h1>
          <p class="hero-summary" id="hero-summary"></p>
          <div class="hero-meta">
            <span id="basis-date"></span>
          </div>
        </div>
        <aside class="hero-panel">
          <p class="panel-kicker">Live price</p>
          <div class="price-strip" id="price-strip"></div>
        </aside>
      </header>

      <main class="dashboard">
        <section class="metric-grid reveal" id="metric-grid"></section>

        <section class="section reveal panel-accordion" id="targets-section">
          <div class="section-heading section-heading--accordion">
            <button
              type="button"
              class="section-toggle"
              id="targets-toggle"
              aria-expanded="false"
              aria-controls="targets-panel"
            >
              <div class="section-heading-main">
                <span class="section-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="7.5" />
                    <circle cx="12" cy="12" r="3" />
                    <path d="M12 2.5v3" />
                    <path d="M12 18.5v3" />
                    <path d="M2.5 12h3" />
                    <path d="M18.5 12h3" />
                  </svg>
                </span>
                <div class="section-heading-copy">
                  <p class="eyebrow">Watchlist</p>
                  <h2>관심종목</h2>
                </div>
              </div>
              <span class="section-toggle-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="m6 9 6 6 6-6" />
                </svg>
              </span>
            </button>
          </div>
          <div class="panel-collapse" id="targets-panel" aria-hidden="true">
            <div class="targets-layout">
              <article class="panel targets-hero-card" id="targets-hero"></article>
              <div class="targets-grid" id="targets-grid"></div>
            </div>
          </div>
        </section>

        <section class="section reveal" id="portfolio-overview-section">
          <div class="panel panel-accordion" id="allocation-section">
            <div class="section-heading section-heading--accordion">
              <button
                type="button"
                class="section-toggle"
                id="allocation-toggle"
                aria-expanded="false"
                aria-controls="allocation-panel"
              >
                <div class="section-heading-main">
                  <span class="section-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <path d="M12 3v9l7.5 4.5A9 9 0 1 1 12 3Z" />
                      <path d="M13.5 3.2A9 9 0 0 1 21 12h-7.5V3.2Z" />
                    </svg>
                </span>
                <div class="section-heading-copy">
                  <p class="eyebrow">Portfolio Mix</p>
                  <h2>자산 분포</h2>
                </div>
                </div>
                <span class="section-toggle-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="m6 9 6 6 6-6" />
                  </svg>
                </span>
              </button>
            </div>
            <div class="panel-collapse" id="allocation-panel" aria-hidden="true">
              <div class="allocation-layout">
                <div class="allocation-visual" id="allocation-visual"></div>
                <div class="allocation-legend" id="allocation-legend"></div>
              </div>
            </div>
          </div>
        </section>

        <section class="section reveal" id="timeline-section">
          <div class="panel panel-accordion">
            <div class="section-heading section-heading--accordion">
              <button
                type="button"
                class="section-toggle"
                id="timeline-toggle"
                aria-expanded="false"
                aria-controls="timeline-panel"
              >
                <div class="section-heading-main">
                  <span class="section-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <path d="M12 7v5l3 2" />
                      <circle cx="12" cy="12" r="8.5" />
                    </svg>
                </span>
                <div class="section-heading-copy">
                      <p class="eyebrow">Trade Journal</p>
                      <h2>전체 거래 타임라인</h2>
                  </div>
                </div>
                <span class="section-toggle-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="m6 9 6 6 6-6" />
                  </svg>
                </span>
              </button>
            </div>
            <div class="panel-collapse" id="timeline-panel" aria-hidden="true">
              <div class="timeline-toolbar">
                <div class="view-tabs" role="tablist" aria-label="거래 타임라인 보기">
                  <button
                    type="button"
                    class="view-tab is-active"
                    id="timeline-tab-list"
                    role="tab"
                    aria-selected="true"
                    aria-controls="timeline-view-list"
                    data-view-target="list"
                  >
                    리스트 뷰
                  </button>
                  <button
                    type="button"
                    class="view-tab"
                    id="timeline-tab-calendar"
                    role="tab"
                  aria-selected="false"
                  aria-controls="timeline-view-calendar"
                  data-view-target="calendar"
                  tabindex="-1"
                >
                  캘린더 뷰
                </button>
              </div>
              <button type="button" class="btn-add-trade" id="btn-add-trade" aria-label="거래 추가">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                  <path d="M12 5v14M5 12h14"/>
                </svg>
                거래 추가
              </button>
            </div>
              <div class="timeline-views">
                <div
                  class="timeline-view is-active"
                  id="timeline-view-list"
                  data-view="list"
                  role="tabpanel"
                  aria-labelledby="timeline-tab-list"
                >
                  <div class="timeline" id="timeline"></div>
                </div>
                <div
                  class="timeline-view"
                  id="timeline-view-calendar"
                  data-view="calendar"
                  role="tabpanel"
                  aria-labelledby="timeline-tab-calendar"
                  hidden
                >
                  <div class="timeline-calendar" id="timeline-calendar"></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="section reveal panel-accordion" id="holdings-section">
          <div class="section-heading section-heading--accordion">
            <button
              type="button"
              class="section-toggle"
              id="holdings-toggle"
              aria-expanded="false"
              aria-controls="holdings-panel"
            >
              <div class="section-heading-main">
                <span class="section-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M4 7.5h16v10H4z" />
                    <path d="M8 7.5V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v1.5" />
                    <path d="M4 12h16" />
                  </svg>
                </span>
                <div class="section-heading-copy">
                  <p class="eyebrow">Open Positions</p>
                  <h2>보유 종목 상세</h2>
                </div>
              </div>
              <span class="section-toggle-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="m6 9 6 6 6-6" />
                </svg>
              </span>
            </button>
          </div>
          <div class="panel-collapse" id="holdings-panel" aria-hidden="true">
            <div class="holdings-grid" id="holdings-grid"></div>
          </div>
        </section>

        <section class="section reveal charts-section panel-accordion" id="performance-section">
          <div class="section-heading section-heading--accordion">
            <button
              type="button"
              class="section-toggle"
              id="performance-toggle"
              aria-expanded="false"
              aria-controls="performance-panel"
            >
              <div class="section-heading-main">
                <span class="section-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M4 18V6" />
                    <path d="M4 18h16" />
                    <path d="M8 14v-3" />
                    <path d="M12 14V9" />
                    <path d="M16 14V7" />
                  </svg>
                </span>
                <div class="section-heading-copy">
                  <p class="eyebrow">Realized PnL</p>
                  <h2>누적 실현손익 추이</h2>
                </div>
              </div>
              <span class="section-toggle-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="m6 9 6 6 6-6" />
                </svg>
              </span>
            </button>
          </div>
          <div class="panel-collapse" id="performance-panel" aria-hidden="true">
            <div class="chart-grid">
              <article class="chart-card chart-card--history">
                <div class="chart-card-header">
                  <div>
                    <p class="chart-kicker">Cumulative PnL</p>
                    <h3>누적 실현손익 추이</h3>
                  </div>
                  <div class="chart-stat" id="realized-chart-stat"></div>
                </div>
                <div class="chart-canvas-wrap">
                  <canvas id="realized-chart"></canvas>
                </div>
              </article>
            </div>
          </div>
        </section>

        <section class="section reveal" id="insights-section">
          <div class="panel panel-accordion" id="defense-section">
            <div class="section-heading section-heading--accordion">
              <button
                type="button"
                class="section-toggle"
                id="defense-toggle"
                aria-expanded="false"
                aria-controls="defense-panel"
              >
                <div class="section-heading-main">
                  <span class="section-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <path d="M12 3 5 6v5c0 5 2.8 8.3 7 10 4.2-1.7 7-5 7-10V6l-7-3Z" />
                      <path d="m9.5 12 1.7 1.7 3.8-4.2" />
                    </svg>
                  </span>
                  <div class="section-heading-copy">
                    <p class="eyebrow">Defense Metrics</p>
                    <h2>XRP 방어매매 지표</h2>
                  </div>
                </div>
                <span class="section-toggle-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="m6 9 6 6 6-6" />
                  </svg>
                </span>
              </button>
            </div>
            <div class="panel-collapse" id="defense-panel" aria-hidden="true">
              <div class="defense-grid" id="defense-grid"></div>
            </div>
          </div>
        </section>

        <section class="section strategy reveal panel-accordion" id="strategy-section">
          <div class="section-heading section-heading--accordion">
            <button
              type="button"
              class="section-toggle"
              id="strategy-toggle"
              aria-expanded="false"
              aria-controls="strategy-panel"
            >
              <div class="section-heading-main">
                <span class="section-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M7 4.5h10a2 2 0 0 1 2 2v13l-4-2-4 2-4-2-4 2v-13a2 2 0 0 1 2-2h2" />
                    <path d="M8.5 8.5h7" />
                    <path d="M8.5 12h5.5" />
                  </svg>
                </span>
                <div class="section-heading-copy">
                  <p class="eyebrow">Execution Playbook</p>
                  <h2>플레이 전략</h2>
                </div>
              </div>
              <span class="section-toggle-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="m6 9 6 6 6-6" />
                </svg>
              </span>
            </button>
          </div>
          <div class="panel-collapse" id="strategy-panel" aria-hidden="true">
            <div class="strategy-playbook" id="strategy-playbook"></div>
          </div>
        </section>
      </main>
    </div>

    <div class="calendar-modal" id="calendar-detail-modal" hidden>
      <div class="calendar-modal-backdrop" data-calendar-modal-close></div>
      <div
        class="calendar-modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="calendar-detail-title"
        aria-describedby="calendar-detail-summary"
      >
        <div class="calendar-modal-header">
          <div>
            <p class="eyebrow">Trade Detail</p>
            <h3 id="calendar-detail-title"></h3>
            <p class="calendar-modal-summary" id="calendar-detail-summary"></p>
          </div>
          <button type="button" class="calendar-modal-close" data-calendar-modal-close aria-label="상세 내역 닫기">
            <svg viewBox="0 0 24 24">
              <path d="M6 6l12 12" />
              <path d="M18 6 6 18" />
            </svg>
          </button>
        </div>
        <div class="calendar-modal-list" id="calendar-detail-list"></div>
      </div>
    </div>

    <!-- 거래 추가 모달 -->
    <div class="trade-modal" id="trade-modal" hidden aria-hidden="true" role="dialog" aria-modal="true">
      <div class="trade-modal-dialog">
        <div class="trade-modal-header">
          <div>
            <p class="eyebrow">Quick Entry</p>
            <h3>거래 추가</h3>
            <p class="trade-modal-helper">필수값만 입력하면 거래금액과 수수료는 자동 계산됩니다.</p>
          </div>
          <button type="button" class="trade-modal-close" data-trade-modal-close aria-label="닫기">
            <svg viewBox="0 0 24 24">
              <path d="M6 6l12 12" />
              <path d="M18 6 6 18" />
            </svg>
          </button>
        </div>
        <form class="trade-form" id="trade-form">
          <div class="form-row">
            <div class="form-group">
              <label for="trade-date">날짜</label>
              <input type="text" id="trade-date" name="date" placeholder="4/08" required />
            </div>
            <div class="form-group">
              <label for="trade-market">시장</label>
              <select id="trade-market" name="market" required>
                <option value="국내주식">국내주식</option>
                <option value="미국주식">미국주식</option>
                <option value="암호화폐">암호화폐</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="trade-asset">자산</label>
              <input type="text" id="trade-asset" name="asset" placeholder="SK하이닉스" required />
            </div>
            <div class="form-group">
              <label for="trade-side">매수/매도</label>
              <select id="trade-side" name="side" required>
                <option value="매수">매수</option>
                <option value="매도">매도</option>
              </select>
            </div>
          </div>

          <div class="form-group form-group--full">
            <label>빠른 선택</label>
            <div class="form-chip-row" id="trade-asset-quick">
              <button type="button" class="form-chip" data-asset-chip data-market="암호화폐" data-asset="비트코인">비트코인</button>
              <button type="button" class="form-chip" data-asset-chip data-market="암호화폐" data-asset="ETH">ETH</button>
              <button type="button" class="form-chip" data-asset-chip data-market="암호화폐" data-asset="XRP">XRP</button>
              <button type="button" class="form-chip" data-asset-chip data-market="미국주식" data-asset="PLTR">PLTR</button>
              <button type="button" class="form-chip" data-asset-chip data-market="미국주식" data-asset="CRCL">CRCL</button>
              <button type="button" class="form-chip" data-asset-chip data-market="국내주식" data-asset="삼성전자">삼성전자</button>
              <button type="button" class="form-chip" data-asset-chip data-market="국내주식" data-asset="SK하이닉스">SK하이닉스</button>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="trade-quantity">수량</label>
              <input type="number" id="trade-quantity" name="quantity" placeholder="7" step="any" required />
            </div>
            <div class="form-group">
              <label for="trade-price" id="trade-price-label">단가 (원)</label>
              <input type="number" id="trade-price" name="price" placeholder="1001000" step="any" required />
              <p class="form-help" id="trade-price-help">체결 단가 기준으로 입력합니다.</p>
            </div>
          </div>

          <input type="hidden" id="trade-amount" name="amount" />
          <input type="hidden" id="trade-fee" name="fee" />

          <div class="trade-summary-grid">
            <article class="trade-summary-card">
              <span>플랫폼</span>
              <strong id="trade-summary-broker">업비트</strong>
            </article>
            <article class="trade-summary-card">
              <span>거래금액</span>
              <strong id="trade-summary-amount">자동 계산</strong>
            </article>
            <article class="trade-summary-card">
              <span>예상 수수료</span>
              <strong id="trade-summary-fee">자동 계산</strong>
            </article>
          </div>

          <div class="form-row">
            <div class="form-group" data-trade-broker-group>
              <label for="trade-broker">플랫폼</label>
              <input
                type="text"
                id="trade-broker"
                name="broker"
                list="trade-broker-suggestions"
                placeholder="미래에셋"
                autocomplete="off"
              />
              <datalist id="trade-broker-suggestions">
                <option value="카카오증권"></option>
                <option value="미래에셋"></option>
                <option value="토스증권"></option>
                <option value="키움증권"></option>
                <option value="한국투자증권"></option>
                <option value="NH투자증권"></option>
              </datalist>
              <p class="form-help" id="trade-broker-help">국내주식과 미국주식 거래만 입력하면 됩니다.</p>
            </div>
            <div class="form-group">
              <label for="trade-note">메모 (선택)</label>
              <input type="text" id="trade-note" name="note" placeholder="비워도 됩니다" />
            </div>
          </div>

          <p class="trade-form-status" id="trade-form-status" role="status" aria-live="polite"></p>

          <div class="form-actions">
            <button type="button" class="btn-secondary" data-trade-modal-close>취소</button>
            <button type="submit" class="btn-primary">저장</button>
          </div>
        </form>
      </div>
    </div>

    <template id="metric-card-template">
      <article class="metric-card">
        <p class="metric-label"></p>
        <strong class="metric-value"></strong>
        <p class="metric-detail"></p>
      </article>
    </template>

    <script src="./data/portfolio-data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js/dist/chart.umd.min.js" defer></script>
    <script src="./app.js"></script>
  </body>
</html>
